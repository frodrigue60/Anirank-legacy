version: '3.8'

services:
  # Servicio MinIO (S3 compatible storage)
  minio:
    image: minio/minio
    container_name: anirank-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - anirank-network
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # Servicio PostgreSQL (Database)
  db:
    image: postgres:15-alpine
    container_name: anirank-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: anirank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - anirank-network
    restart: unless-stopped

volumes:
  minio_data:
  pg_data:

networks:
  anirank-network:
    driver: bridge