version: '3.8'

services:
  # Servicio MinIO (S3 compatible storage)
  minio:
    image: minio/minio
    container_name: anirank-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - anirank-network
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  minio_data:

networks:
  anirank-network:
    driver: bridge